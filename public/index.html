<!DOCTYPE html>
<html>
<head>
    <title>Neon Jump</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="auth">
            <h2>NEON JUMP</h2>
            <input type="text" id="username" placeholder="USERNAME">
            <input type="password" id="password" placeholder="PASSWORD">
            <button id="registerBtn">REGISTER</button>
            <button id="loginBtn">LOGIN</button>
        </div>
        <div id="gameUI" style="display: none;">
            <div id="coins">COINS: 0</div>
            <div id="jumpPower">JUMP POWER: 10</div>
        </div>
        <div id="leaderboard" style="display: none;">
            <h3>LEADERBOARD</h3>
            <div id="leaderboardList"></div>
        </div>
        <button id="upgradeBtn" style="display: none;">UPGRADE JUMP (COST: 100)</button>
        <button id="chatToggle" style="display: none;">CHAT</button>
        <button id="jumpBtn" style="display: none;">ПРЫЖОК</button>
        <div id="mobileControls" style="display: none;">
            <button id="wBtn" class="controlBtn">W</button>
            <div class="controlRow">
                <button id="aBtn" class="controlBtn">A</button>
                <button id="sBtn" class="controlBtn">S</button>
                <button id="dBtn" class="controlBtn">D</button>
            </div>
        </div>
    </div>
    <div id="chat" style="display: none;">
        <div id="chatMessages"></div>
        <div id="chatInputContainer">
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button id="chatSend">SEND</button>
        </div>
    </div>
    <div id="errorPopup">
        <div id="errorText"></div>
        <button id="closeErrorBtn">OK</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
